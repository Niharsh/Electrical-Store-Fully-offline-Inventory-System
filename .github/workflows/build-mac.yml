name: Build macOS DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install root dependencies
      - name: Install root dependencies
        run: npm install

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: cd frontend && npm install

      # Build frontend
      - name: Build frontend
        run: cd frontend && npm run build

      # Verify frontend build output exists
      - name: Verify frontend dist
        run: |
          echo "Checking frontend/dist contents:"
          ls -la frontend/dist/
          echo "Frontend build verified ✅"

      # Rebuild better-sqlite3 for Electron
      - name: Rebuild native modules
        run: npx @electron/rebuild -f -w better-sqlite3

      # Build DMG
      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: "electron-builder"
        run: |
          npx electron-builder --mac --x64 --arm64 --publish never

      # Verify DMG was created
      - name: Verify DMG output
        run: |
          echo "Checking dist-electron contents:"
          ls -la dist-electron/
          echo "Looking for DMG files:"
          find dist-electron -name "*.dmg" -type f

      # Upload artifact
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ojashwai-mac-dmg
          path: dist-electron/*.dmg
          retention-days: 7
          if-no-files-found: error
