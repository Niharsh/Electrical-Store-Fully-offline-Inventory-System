name: Build macOS DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-mac:
    runs-on: macos-14

    steps:
      # ─────────────────────────────────────────
      # 1. Check out the repository
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Set up Node.js
      # ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ─────────────────────────────────────────
      # 3. Install ROOT dependencies
      #    (electron, electron-builder, better-sqlite3)
      # ─────────────────────────────────────────
      - name: Install root dependencies
        run: npm install

      # ─────────────────────────────────────────
      # 4. Install FRONTEND dependencies
      #    (React, Vite, etc. live in frontend/)
      # ─────────────────────────────────────────
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # ─────────────────────────────────────────
      # 5. Build the React/Vite frontend
      #    Output goes to frontend/dist/
      # ─────────────────────────────────────────
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # ─────────────────────────────────────────
      # 6. Rebuild better-sqlite3 for Electron
      #    CRITICAL — native module must match
      #    the Electron version, not Node version
      # ─────────────────────────────────────────
      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f -w better-sqlite3

      # ─────────────────────────────────────────
      # 7. Build the .dmg with electron-builder
      #    Builds only x64 (Intel macOS)
      #    No code signing (no Apple account)
      # ─────────────────────────────────────────
      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"   # Skip code signing
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed by electron-builder
        run: npx electron-builder --mac --x64

      # ─────────────────────────────────────────
      # 8. VALIDATE DMG INTEGRITY
      #    Critical: verify the DMG is valid and mountable
      # ─────────────────────────────────────────
      - name: Validate DMG integrity
        run: |
          DMG_FILE=$(ls dist-electron/*.dmg 2>/dev/null | head -1)
          
          if [ -z "$DMG_FILE" ]; then
            echo "ERROR: No DMG file found in dist-electron/"
            exit 1
          fi
          
          echo "Found DMG: $DMG_FILE"
          
          # Get file size and verify it's not zero or suspiciously small
          FILE_SIZE=$(stat -f%z "$DMG_FILE")
          echo "DMG file size: $FILE_SIZE bytes"
          
          if [ $FILE_SIZE -lt 50000000 ]; then
            echo "WARNING: DMG file appears suspiciously small (< 50 MB)"
          fi
          
          # Validate DMG header with hdiutil
          echo "Validating DMG structure..."
          if hdiutil verify "$DMG_FILE"; then
            echo "✓ DMG validation PASSED"
          else
            echo "✗ DMG validation FAILED - image may be corrupted"
            exit 1
          fi
          
          # List contents for debugging
          echo "DMG contents:"
          hdiutil imageinfo "$DMG_FILE"

      # ─────────────────────────────────────────
      # 9. Calculate checksums for verification
      #    Users can compare on their Mac
      # ─────────────────────────────────────────
      - name: Generate checksums
        run: |
          cd dist-electron
          sha256sum *.dmg > SHA256SUMS
          md5sum *.dmg > MD5SUMS
          cat SHA256SUMS
          cat MD5SUMS

      # ─────────────────────────────────────────
      # 10. Upload .dmg files as downloadable artifacts
      #     Available for 7 days after the build
      # ─────────────────────────────────────────
      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ojashwai-mac-dmg
          path: |
            dist-electron/*.dmg
            dist-electron/SHA256SUMS
            dist-electron/MD5SUMS
          retention-days: 7
          if-no-files-found: error  # Fail loudly if DMG wasn't created

      # ─────────────────────────────────────────
      # 11. Create GitHub Release (optional)
      #     Automatically attach DMG to release
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-electron/*.dmg
            dist-electron/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
